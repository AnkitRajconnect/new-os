<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA4 Masterclass – SkillOS</title>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ALIGNED WITH YOUR ORIGINAL CSS 
   Using your variables and layout structure from index.html and ga4.html
*/
:root {
  --blue:#1a73e8; --blue-l:#e8f0fe;
  --green:#34a853; --red:#ea4335; --yellow:#fbbc04;
  --coach:#6c63ff; --coach-l:rgba(108,99,255,.1);
  --text:#202124; --text2:#5f6368;
  --border:#dadce0; --bg:#f1f3f4; --white:#fff;
  --sidebar:#1c1c28;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Roboto',sans-serif;background:var(--bg);height:100vh;display:flex;overflow:hidden}

/* SIDEBAR - Aligned with your uploaded ga4.html */
.sidebar { width:240px; background:var(--sidebar); color:#fff; display:flex; flex-direction:column; flex-shrink:0; }
.sb-header { padding:20px; border-bottom:1px solid rgba(255,255,255,.1); }
.sb-nav { flex:1; overflow-y:auto; padding:10px 0; }
.mod-item { padding:12px 20px; font-size:12px; cursor:pointer; opacity:0.6; transition:0.2s; display:flex; align-items:center; gap:10px; }
.mod-item.active { opacity:1; background:rgba(255,255,255,.05); border-left:4px solid var(--blue); }
.mod-item.done { color:var(--green); opacity:1; }

/* MAIN CONTENT */
.main { flex:1; display:flex; flex-direction:column; background:#fff; position:relative; }
.instr-panel { width:320px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--white); }
.coach-header { padding:20px; background:var(--coach-l); border-bottom:1px solid var(--border); }
.dashboard { flex:1; background:var(--bg); padding:20px; overflow-y:auto; }

/* DASHBOARD COMPONENTS */
.card { background:#fff; border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:15px; }
.view { display:none; } .view.active { display:block; }
.pulsing { outline:3px solid var(--blue); animation:pulse 1.5s infinite; cursor:pointer; }
@keyframes pulse { 0% { box-shadow:0 0 0 0px rgba(26,115,232,0.4); } 70% { box-shadow:0 0 0 10px rgba(26,115,232,0); } 100% { box-shadow:0 0 0 0px rgba(26,115,232,0); } }

/* QUIZ UI */
.quiz-box { background:var(--blue-l); padding:15px; border-radius:8px; margin-top:10px; }
.quiz-opt { display:block; width:100%; padding:10px; margin:5px 0; background:#fff; border:1px solid var(--border); border-radius:4px; cursor:pointer; text-align:left; font-size:13px; }
.quiz-opt:hover { background:var(--blue-l); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-header">
    <h4 style="font-family:'Google Sans'">GA4 MASTERCLASS</h4>
    <p style="font-size:10px; opacity:0.5; margin-top:4px">TechMart Case Study</p>
  </div>
  <div class="sb-nav" id="sidebar-list">
    </div>
</div>

<div class="instr-panel">
  <div class="coach-header">
    <div class="case-tag" style="font-size:10px; color:var(--coach); font-weight:bold; margin-bottom:5px">CASE STUDY: TECHMART</div>
    <div id="coach-txt" style="font-size:14px; font-weight:500">Welcome! Let's get started.</div>
  </div>
  <div id="step-area" style="padding:20px; flex:1; overflow-y:auto">
    </div>
</div>

<div class="main">
  <div class="dashboard">
    <div id="view-admin" class="view">
      <div class="card">
        <h3>Property Settings</h3>
        <button id="btn-create-prop" style="margin-top:10px; padding:10px" onclick="dashClick('btn-create-prop')">+ Create Property</button>
        <div id="install-area" style="display:none; margin-top:20px">
          <p>Global Site Tag (gtag.js)</p>
          <pre id="code-box" style="background:#f8f9fa; padding:10px; font-size:11px; margin-top:5px" onclick="dashClick('code-box')">&lt;script async src="gtag.js"&gt;&lt;/script&gt;</pre>
        </div>
      </div>
    </div>

    <div id="view-snapshot" class="view">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
        <div class="card" id="m-users" onclick="dashClick('m-users')"><h4>Users</h4><p>12,403</p></div>
        <div class="card" id="m-eng" onclick="dashClick('m-eng')"><h4>Avg Engagement</h4><p id="eng-val">1m 42s</p></div>
      </div>
    </div>

    <div id="view-acquisition" class="view">
      <div class="card">
        <h3>Traffic Acquisition</h3>
        <table style="width:100%; margin-top:10px; text-align:left">
          <tr id="row-organic" onclick="dashClick('row-organic')"><td>Organic Search</td><td>5,200</td></tr>
          <tr><td>Direct</td><td>3,100</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
/**
 * 10 LESSONS ALIGNED WITH YOUR SIDEBAR & I-D-E-A PATTERN
 */
const COURSE = [
  {
    id: 1, title: '1. Create Property', view: 'view-admin',
    steps: [
      { type: 'explain', coach: "TechMart needs a GA4 property to track their new store. A Property is your data container." },
      { type: 'demo', expect: 'btn-create-prop', coach: "Watch the 'Create' button. It's the first step in setup." },
      { type: 'do', expect: 'btn-create-prop', coach: "Now you try. Click the 'Create Property' button to start." },
      { type: 'quiz', q: "What is a GA4 Property?", a: ["A website theme", "A data container", "A user password"], c: 1 }
    ]
  },
  {
    id: 2, title: '2. Install gtag.js', view: 'view-admin',
    steps: [
      { type: 'explain', coach: "The gtag.js is the bridge that sends data from your code to GA4." },
      { type: 'demo', expect: 'code-box', coach: "The code block is what you'll copy into your website's <head>." },
      { type: 'do', expect: 'code-box', coach: "Click the code snippet to simulate 'copying' it." },
      { type: 'quiz', q: "Where does the tag go?", a: ["In the <footer>", "In the <head>", "In the CSS"], c: 1 }
    ]
  },
  // ... (Lesson 3-10 would follow this exact pattern)
];

let curIdx = 0;
let curStep = 0;

function init() {
  const sb = document.getElementById('sidebar-list');
  COURSE.forEach((l, i) => {
    const item = document.createElement('div');
    item.className = `mod-item ${i === 0 ? 'active' : ''}`;
    item.innerHTML = `<span>${l.title}</span>`;
    item.onclick = () => loadLesson(i);
    sb.appendChild(item);
  });
  renderStep();
}

function loadLesson(idx) {
  curIdx = idx;
  curStep = 0;
  document.querySelectorAll('.mod-item').forEach((el, i) => el.classList.toggle('active', i === idx));
  renderStep();
}

function renderStep() {
  const lesson = COURSE[curIdx];
  const step = lesson.steps[curStep];
  
  // Update UI Views
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(lesson.view).classList.add('active');
  
  // Update Coach Text
  document.getElementById('coach-txt').innerText = step.coach;
  
  // Handle Quiz vs Task
  const area = document.getElementById('step-area');
  area.innerHTML = '';
  
  if (step.type === 'quiz') {
    const qBox = document.createElement('div');
    qBox.className = 'quiz-box';
    qBox.innerHTML = `<strong>${step.q}</strong>`;
    step.a.forEach((ans, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.innerText = ans;
      btn.onclick = () => {
        if (i === step.c) { alert("Correct!"); nextStep(); }
        else { alert("Try again!"); }
      };
      qBox.appendChild(btn);
    });
    area.appendChild(qBox);
  } else {
    const btn = document.createElement('button');
    btn.style = "width:100%; padding:12px; background:var(--blue); color:#fff; border:none; border-radius:4px; margin-top:10px";
    btn.innerText = step.type === 'explain' ? "Got it, next →" : "Click the highlighted area...";
    if (step.type === 'explain') btn.onclick = nextStep;
    area.appendChild(btn);
    
    // Pulse the expected element
    if (step.expect) {
      document.querySelectorAll('.pulsing').forEach(p => p.classList.remove('pulsing'));
      document.getElementById(step.expect)?.classList.add('pulsing');
    }
  }
}

function nextStep() {
  curStep++;
  if (curStep >= COURSE[curIdx].steps.length) {
    if (curIdx < COURSE.length - 1) loadLesson(curIdx + 1);
    else alert("Course Complete!");
  } else {
    renderStep();
  }
}

function dashClick(id) {
  const lesson = COURSE[curIdx];
  const step = lesson.steps[curStep];
  if (step.expect === id) {
    document.getElementById(id).classList.remove('pulsing');
    nextStep();
  }
}

window.onload = init;
</script>
</body>
</html>
