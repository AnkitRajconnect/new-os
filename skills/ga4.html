/* =================================================================
   RESET & VARIABLES
================================================================= */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#1a73e8;--blue-l:#e8f0fe;
  --green:#34a853;--red:#ea4335;--yellow:#fbbc04;
  --coach:#6c63ff;--coach-l:rgba(108,99,255,.1);
  --text:#202124;--text2:#5f6368;
  --border:#dadce0;--bg:#f1f3f4;--white:#fff;
  --sidebar:#1c1c28;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* =================================================================
   TOP BAR
================================================================= */
.topbar{
  height:48px;background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;
  flex-shrink:0;z-index:50;
}
.topbar-back{color:var(--text2);font-size:11px;text-decoration:none;display:flex;align-items:center;gap:4px;white-space:nowrap}
.topbar-back:hover{color:var(--blue)}
.divider{width:1px;height:18px;background:var(--border);flex-shrink:0}
.tb-phase{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.tb-lesson{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap}
.tb-spacer{flex:1}
.tb-time{font-size:11px;color:var(--text2);white-space:nowrap}
.progress-wrap{display:flex;align-items:center;gap:6px}
.progress-bar{width:100px;height:3px;background:var(--border);border-radius:2px}
.progress-fill{height:100%;background:var(--coach);border-radius:2px;transition:width .4s}
.progress-text{font-size:10px;color:var(--text2);white-space:nowrap}
.btn-audio{width:28px;height:28px;border-radius:50%;background:var(--coach-l);border:1px solid rgba(108,99,255,.3);color:var(--coach);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-audio.on{background:var(--coach);color:#fff}
.btn-john{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;border:none;border-radius:14px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}

/* =================================================================
   LAYOUT
================================================================= */
.app{display:flex;flex:1;overflow:hidden}

/* =================================================================
   LEFT SIDEBAR
================================================================= */
.sidebar{
  width:210px;min-width:210px;background:var(--sidebar);
  display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;
}
.sidebar-logo{
  padding:12px 12px 8px;border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:7px;
}
.sidebar-logo svg{width:20px;height:20px;flex-shrink:0}
.sidebar-logo-text{color:#fff;font-size:11px;font-weight:600;font-family:'Google Sans',sans-serif}
.phase-block{padding:6px 0}
.phase-hdr{
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,.28);padding:5px 12px 2px;
}
.mod-item{
  display:flex;align-items:flex-start;gap:7px;
  padding:7px 12px;color:rgba(255,255,255,.5);
